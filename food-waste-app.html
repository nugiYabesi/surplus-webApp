<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surplus - Fresh Deals, Zero Waste</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .nav {
            background: #f8f9fa;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #dee2e6;
        }

        .nav .user-info {
            font-weight: 600;
            color: #333;
        }

        .nav button {
            background: #dc3545;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }

        .nav button:hover {
            background: #c82333;
        }

        .content {
            padding: 40px;
        }

        .auth-container {
            max-width: 500px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #6c757d;
            margin-top: 10px;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .food-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .food-card {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .food-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .food-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .food-card-content {
            padding: 20px;
        }

        .food-card h3 {
            color: #333;
            margin-bottom: 10px;
            font-size: 1.3em;
        }

        .food-card p {
            color: #666;
            margin-bottom: 8px;
            font-size: 0.9em;
        }

        .price-section {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 15px 0;
        }

        .original-price {
            text-decoration: line-through;
            color: #999;
            font-size: 0.9em;
        }

        .discounted-price {
            font-size: 1.5em;
            color: #28a745;
            font-weight: bold;
        }

        .food-card button {
            width: 100%;
            padding: 12px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 10px;
        }

        .food-card button:hover {
            background: #218838;
        }

        .food-card .btn-danger {
            background: #dc3545;
        }

        .food-card .btn-danger:hover {
            background: #c82333;
        }

        .filters {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
        }

        .filters h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .filter-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state svg {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab {
            padding: 12px 24px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            color: #666;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab:hover {
            color: #667eea;
        }

        .order-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
        }

        .order-card h4 {
            color: #333;
            margin-bottom: 10px;
        }

        .order-card p {
            color: #666;
            margin-bottom: 5px;
            font-size: 0.9em;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
            margin-top: 10px;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .status-ready {
            background: #d1ecf1;
            color: #0c5460;
        }

        .status-completed {
            background: #d4edda;
            color: #155724;
        }

        .image-preview {
            margin-top: 10px;
            max-width: 100%;
            max-height: 200px;
            border-radius: 8px;
            display: none;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .food-grid {
                grid-template-columns: 1fr;
            }

            .filter-group {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌱 Surplus</h1>
            <p>Fresh deals, zero waste</p>
        </div>

        <!-- Navigation (shown when logged in) -->
        <div id="nav" class="nav hidden">
            <div class="user-info">
                Welcome, <span id="userName"></span> (<span id="userRole"></span>)
            </div>
            <button onclick="logout()">Logout</button>
        </div>

        <div class="content">
            <!-- Login/Register Page -->
            <div id="authPage" class="auth-container">
                <div id="loginForm">
                    <h2 style="margin-bottom: 30px; color: #333;">Login</h2>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="loginEmail" placeholder="Enter your email">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="loginPassword" placeholder="Enter your password">
                    </div>
                    <button class="btn" onclick="login()">Login</button>
                    <button class="btn btn-secondary" onclick="showRegister()">Create Account</button>
                </div>

                <div id="registerForm" class="hidden">
                    <h2 style="margin-bottom: 30px; color: #333;">Register</h2>
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" id="regName" placeholder="Enter your name">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="regEmail" placeholder="Enter your email">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="regPassword" placeholder="Enter your password">
                    </div>
                    <div class="form-group">
                        <label>Role</label>
                        <select id="regRole" onchange="toggleBusinessName()">
                            <option value="consumer">Consumer</option>
                            <option value="vendor">Vendor</option>
                        </select>
                    </div>
                    <div class="form-group hidden" id="businessNameGroup">
                        <label>Business Name</label>
                        <input type="text" id="regBusinessName" placeholder="Enter your business name">
                    </div>
                    <div class="form-group">
                        <label>Location</label>
                        <select id="regLocation">
                            <option value="Kigali Downtown">Kigali Downtown</option>
                            <option value="Kimironko">Kimironko</option>
                            <option value="Remera">Remera</option>
                            <option value="Nyamirambo">Nyamirambo</option>
                            <option value="Kicukiro">Kicukiro</option>
                        </select>
                    </div>
                    <button class="btn" onclick="register()">Register</button>
                    <button class="btn btn-secondary" onclick="showLogin()">Back to Login</button>
                </div>
            </div>

            <!-- Vendor Dashboard -->
            <div id="vendorDashboard" class="hidden">
                <div class="tabs">
                    <button class="tab active" onclick="showVendorTab('post')">Post Food</button>
                    <button class="tab" onclick="showVendorTab('items')">My Items</button>
                    <button class="tab" onclick="showVendorTab('orders')">Orders Received</button>
                </div>

                <!-- Post Food Tab -->
                <div id="vendorPostTab">
                    <h2 style="margin-bottom: 30px; color: #333;">Post New Food Item</h2>
                    <div class="form-group">
                        <label>Food Name</label>
                        <input type="text" id="foodName" placeholder="e.g., Grilled Chicken">
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="foodDesc" placeholder="Describe your food item..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>Original Price (RWF)</label>
                        <input type="number" id="foodOrigPrice" placeholder="e.g., 5000">
                    </div>
                    <div class="form-group">
                        <label>Discounted Price (RWF)</label>
                        <input type="number" id="foodDiscPrice" placeholder="e.g., 3000">
                    </div>
                    <div class="form-group">
                        <label>Quantity Available</label>
                        <input type="number" id="foodQty" placeholder="e.g., 10">
                    </div>
                    <div class="form-group">
                        <label>Image URL</label>
                        <input type="text" id="foodImage" placeholder="Paste image URL here" onchange="previewImage()">
                        <img id="imagePreview" class="image-preview">
                    </div>
                    <div class="form-group">
                        <label>Pickup Time</label>
                        <input type="text" id="foodPickup" placeholder="e.g., 6:00 PM - 8:00 PM">
                    </div>
                    <button class="btn" onclick="postFood()">Post Food Item</button>
                </div>

                <!-- My Items Tab -->
                <div id="vendorItemsTab" class="hidden">
                    <h2 style="margin-bottom: 30px; color: #333;">My Food Items</h2>
                    <div id="vendorItemsList" class="food-grid"></div>
                </div>

                <!-- Orders Tab -->
                <div id="vendorOrdersTab" class="hidden">
                    <h2 style="margin-bottom: 30px; color: #333;">Orders Received</h2>
                    <div id="vendorOrdersList"></div>
                </div>
            </div>

            <!-- Consumer Dashboard -->
            <div id="consumerDashboard" class="hidden">
                <div class="tabs">
                    <button class="tab active" onclick="showConsumerTab('browse')">Browse Food</button>
                    <button class="tab" onclick="showConsumerTab('orders')">My Orders</button>
                </div>

                <!-- Browse Tab -->
                <div id="consumerBrowseTab">
                    <div class="filters">
                        <h3>Filters</h3>
                        <div class="filter-group">
                            <div class="form-group">
                                <label>Location</label>
                                <select id="filterLocation" onchange="applyFilters()">
                                    <option value="">All Locations</option>
                                    <option value="Kigali Downtown">Kigali Downtown</option>
                                    <option value="Kimironko">Kimironko</option>
                                    <option value="Remera">Remera</option>
                                    <option value="Nyamirambo">Nyamirambo</option>
                                    <option value="Kicukiro">Kicukiro</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Max Price (RWF)</label>
                                <input type="number" id="filterPrice" placeholder="e.g., 5000" onchange="applyFilters()">
                            </div>
                            <div class="form-group">
                                <label>Search</label>
                                <input type="text" id="filterSearch" placeholder="Search food name..." onkeyup="applyFilters()">
                            </div>
                        </div>
                    </div>
                    <h2 style="margin-bottom: 20px; color: #333;">Available Food Items</h2>
                    <div id="consumerFoodList" class="food-grid"></div>
                </div>

                <!-- My Orders Tab -->
                <div id="consumerOrdersTab" class="hidden">
                    <h2 style="margin-bottom: 30px; color: #333;">My Orders</h2>
                    <div id="consumerOrdersList"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentUser = null;
        let allFoodItems = [];

        // Initialize app
        function init() {
            const user = JSON.parse(localStorage.getItem('currentUser') || 'null');
            if (user) {
                currentUser = user;
                showDashboard();
            }
        }

        // Auth Functions
        function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                alert('Please fill in all fields');
                return;
            }

            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const user = users.find(u => u.email === email && u.password === password);

            if (user) {
                currentUser = user;
                localStorage.setItem('currentUser', JSON.stringify(user));
                showDashboard();
            } else {
                alert('Invalid credentials');
            }
        }

        function register() {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const role = document.getElementById('regRole').value;
            const businessName = document.getElementById('regBusinessName').value;
            const location = document.getElementById('regLocation').value;

            if (!name || !email || !password || !location) {
                alert('Please fill in all fields');
                return;
            }

            if (role === 'vendor' && !businessName) {
                alert('Please enter business name');
                return;
            }

            const users = JSON.parse(localStorage.getItem('users') || '[]');
            
            if (users.find(u => u.email === email)) {
                alert('Email already exists');
                return;
            }

            const newUser = {
                id: Date.now().toString(),
                name,
                email,
                password,
                role,
                businessName: role === 'vendor' ? businessName : null,
                location
            };

            users.push(newUser);
            localStorage.setItem('users', JSON.stringify(users));
            
            alert('Registration successful! Please login.');
            showLogin();
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('currentUser');
            location.reload();
        }

        function showLogin() {
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('registerForm').classList.add('hidden');
        }

        function showRegister() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.remove('hidden');
        }

        function toggleBusinessName() {
            const role = document.getElementById('regRole').value;
            const businessGroup = document.getElementById('businessNameGroup');
            if (role === 'vendor') {
                businessGroup.classList.remove('hidden');
            } else {
                businessGroup.classList.add('hidden');
            }
        }

        function showDashboard() {
            document.getElementById('authPage').classList.add('hidden');
            document.getElementById('nav').classList.remove('hidden');
            document.getElementById('userName').textContent = currentUser.name;
            document.getElementById('userRole').textContent = currentUser.role;

            if (currentUser.role === 'vendor') {
                document.getElementById('vendorDashboard').classList.remove('hidden');
                loadVendorItems();
                loadVendorOrders();
            } else {
                document.getElementById('consumerDashboard').classList.remove('hidden');
                loadConsumerFood();
                loadConsumerOrders();
            }
        }

        // Vendor Functions
        function showVendorTab(tab) {
            document.querySelectorAll('#vendorDashboard .tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');

            document.getElementById('vendorPostTab').classList.add('hidden');
            document.getElementById('vendorItemsTab').classList.add('hidden');
            document.getElementById('vendorOrdersTab').classList.add('hidden');

            if (tab === 'post') {
                document.getElementById('vendorPostTab').classList.remove('hidden');
            } else if (tab === 'items') {
                document.getElementById('vendorItemsTab').classList.remove('hidden');
                loadVendorItems();
            } else if (tab === 'orders') {
                document.getElementById('vendorOrdersTab').classList.remove('hidden');
                loadVendorOrders();
            }
        }

        function previewImage() {
            const url = document.getElementById('foodImage').value;
            const preview = document.getElementById('imagePreview');
            if (url) {
                preview.src = url;
                preview.style.display = 'block';
            } else {
                preview.style.display = 'none';
            }
        }

        function postFood() {
            const name = document.getElementById('foodName').value;
            const description = document.getElementById('foodDesc').value;
            const origPrice = document.getElementById('foodOrigPrice').value;
            const discPrice = document.getElementById('foodDiscPrice').value;
            const quantity = document.getElementById('foodQty').value;
            const image = document.getElementById('foodImage').value || 'https://via.placeholder.com/400x300?text=Food+Item';
            const pickupTime = document.getElementById('foodPickup').value;

            if (!name || !description || !origPrice || !discPrice || !quantity || !pickupTime) {
                alert('Please fill in all fields');
                return;
            }

            const foodItems = JSON.parse(localStorage.getItem('foodItems') || '[]');
            
            const newItem = {
                id: Date.now().toString(),
                vendorId: currentUser.id,
                vendorName: currentUser.businessName,
                vendorLocation: currentUser.location,
                name,
                description,
                originalPrice: parseFloat(origPrice),
                discountedPrice: parseFloat(discPrice),
                quantity: parseInt(quantity),
                image,
                pickupTime,
                status: 'available',
                createdAt: new Date().toISOString()
            };

            foodItems.push(newItem);
            localStorage.setItem('foodItems', JSON.stringify(foodItems));

            alert('Food item posted successfully!');
            
            // Clear form
            document.getElementById('foodName').value = '';
            document.getElementById('foodDesc').value = '';
            document.getElementById('foodOrigPrice').value = '';
            document.getElementById('foodDiscPrice').value = '';
            document.getElementById('foodQty').value = '';
            document.getElementById('foodImage').value = '';
            document.getElementById('foodPickup').value = '';
            document.getElementById('imagePreview').style.display = 'none';
        }

        function loadVendorItems() {
            const foodItems = JSON.parse(localStorage.getItem('foodItems') || '[]');
            const myItems = foodItems.filter(item => item.vendorId === currentUser.id);
            
            const container = document.getElementById('vendorItemsList');
            
            if (myItems.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>No items posted yet. Start posting food items!</p></div>';
                return;
            }

            container.innerHTML = myItems.map(item => `
                <div class="food-card">
                    <img src="${item.image}" alt="${item.name}">
                    <div class="food-card-content">
                        <h3>${item.name}</h3>
                        <p>${item.description}</p>
                        <div class="price-section">
                            <span class="original-price">${item.originalPrice} RWF</span>
                            <span class="discounted-price">${item.discountedPrice} RWF</span>
                        </div>
                        <p><strong>Quantity:</strong> ${item.quantity}</p>
                        <p><strong>Pickup:</strong> ${item.pickupTime}</p>
                        <p><strong>Status:</strong> ${item.status}</p>
                        <button class="btn-danger" onclick="deleteFood('${item.id}')">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function deleteFood(id) {
            if (!confirm('Are you sure you want to delete this item?')) return;

            let foodItems = JSON.parse(localStorage.getItem('foodItems') || '[]');
            foodItems = foodItems.filter(item => item.id !== id);
            localStorage.setItem('foodItems', JSON.stringify(foodItems));
            
            loadVendorItems();
        }

        function loadVendorOrders() {
            const orders = JSON.parse(localStorage.getItem('orders') || '[]');
            const myOrders = orders.filter(order => order.vendorId === currentUser.id);
            
            const container = document.getElementById('vendorOrdersList');
            
            if (myOrders.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>No orders received yet.</p></div>';
                return;
            }

            container.innerHTML = myOrders.map(order => `
                <div class="order-card">
                    <h4>Order #${order.id.slice(-6)}</h4>
                    <p><strong>Food Item:</strong> ${order.foodItemName}</p>
                    <p><strong>Customer:</strong> ${order.customerName}</p>
                    <p><strong>Quantity:</strong> ${order.quantity}</p>
                    <p><strong>Total Price:</strong> ${order.totalPrice} RWF</p>
                    <p><strong>Order Date:</strong> ${new Date(order.orderDate).toLocaleString()}</p>
                    <span class="status-badge status-${order.status}">${order.status.toUpperCase()}</span>
                </div>
            `).join('');
        }

        // Consumer Functions
        function showConsumerTab(tab) {
            document.querySelectorAll('#consumerDashboard .tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');

            document.getElementById('consumerBrowseTab').classList.add('hidden');
            document.getElementById('consumerOrdersTab').classList.add('hidden');

            if (tab === 'browse') {
                document.getElementById('consumerBrowseTab').classList.remove('hidden');
                loadConsumerFood();
            } else if (tab === 'orders') {
                document.getElementById('consumerOrdersTab').classList.remove('hidden');
                loadConsumerOrders();
            }
        }

        function loadConsumerFood() {
            allFoodItems = JSON.parse(localStorage.getItem('foodItems') || '[]');
            applyFilters();
        }

        function applyFilters() {
            const location = document.getElementById('filterLocation').value;
            const maxPrice = document.getElementById('filterPrice').value;
            const search = document.getElementById('filterSearch').value.toLowerCase();

            let filtered = allFoodItems.filter(item => item.status === 'available');

            if (location) {
                filtered = filtered.filter(item => item.vendorLocation === location);
            }

            if (maxPrice) {
                filtered = filtered.filter(item => item.discountedPrice <= parseFloat(maxPrice));
            }

            if (search) {
                filtered = filtered.filter(item => 
                    item.name.toLowerCase().includes(search) || 
                    item.description.toLowerCase().includes(search)
                );
            }

            displayConsumerFood(filtered);
        }

        function displayConsumerFood(items) {
            const container = document.getElementById('consumerFoodList');
            
            if (items.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>No food items available matching your filters.</p></div>';
                return;
            }

            container.innerHTML = items.map(item => `
                <div class="food-card">
                    <img src="${item.image}" alt="${item.name}">
                    <div class="food-card-content">
                        <h3>${item.name}</h3>
                        <p>${item.description}</p>
                        <p><strong>Vendor:</strong> ${item.vendorName}</p>
                        <p><strong>Location:</strong> ${item.vendorLocation}</p>
                        <div class="price-section">
                            <span class="original-price">${item.originalPrice} RWF</span>
                            <span class="discounted-price">${item.discountedPrice} RWF</span>
                        </div>
                        <p><strong>Available:</strong> ${item.quantity} items</p>
                        <p><strong>Pickup:</strong> ${item.pickupTime}</p>
                        <button onclick="orderFood('${item.id}')">Order Now</button>
                    </div>
                </div>
            `).join('');
        }

        function orderFood(foodId) {
            const quantity = prompt('Enter quantity to order:');
            
            if (!quantity || quantity <= 0) {
                alert('Invalid quantity');
                return;
            }

            const foodItems = JSON.parse(localStorage.getItem('foodItems') || '[]');
            const foodItem = foodItems.find(item => item.id === foodId);

            if (!foodItem) {
                alert('Food item not found');
                return;
            }

            if (parseInt(quantity) > foodItem.quantity) {
                alert('Not enough quantity available');
                return;
            }

            // Update food item quantity
            foodItem.quantity -= parseInt(quantity);
            if (foodItem.quantity === 0) {
                foodItem.status = 'sold';
            }
            localStorage.setItem('foodItems', JSON.stringify(foodItems));

            // Create order
            const orders = JSON.parse(localStorage.getItem('orders') || '[]');
            const newOrder = {
                id: Date.now().toString(),
                consumerId: currentUser.id,
                customerName: currentUser.name,
                vendorId: foodItem.vendorId,
                vendorName: foodItem.vendorName,
                foodItemId: foodItem.id,
                foodItemName: foodItem.name,
                quantity: parseInt(quantity),
                totalPrice: foodItem.discountedPrice * parseInt(quantity),
                status: 'pending',
                orderDate: new Date().toISOString()
            };

            orders.push(newOrder);
            localStorage.setItem('orders', JSON.stringify(orders));

            alert('Order placed successfully! Total: ' + newOrder.totalPrice + ' RWF');
            loadConsumerFood();
        }

        function loadConsumerOrders() {
            const orders = JSON.parse(localStorage.getItem('orders') || '[]');
            const myOrders = orders.filter(order => order.consumerId === currentUser.id);
            
            const container = document.getElementById('consumerOrdersList');
            
            if (myOrders.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>No orders yet. Start ordering!</p></div>';
                return;
            }

            container.innerHTML = myOrders.map(order => `
                <div class="order-card">
                    <h4>Order #${order.id.slice(-6)}</h4>
                    <p><strong>Food Item:</strong> ${order.foodItemName}</p>
                    <p><strong>Vendor:</strong> ${order.vendorName}</p>
                    <p><strong>Quantity:</strong> ${order.quantity}</p>
                    <p><strong>Total Price:</strong> ${order.totalPrice} RWF</p>
                    <p><strong>Order Date:</strong> ${new Date(order.orderDate).toLocaleString()}</p>
                    <span class="status-badge status-${order.status}">${order.status.toUpperCase()}</span>
                </div>
            `).join('');
        }

        // Initialize on page load
        init();
    </script>
</body>
</html>
